name: Build binaries (Windows + Android aarch64)

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  windows:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --manifest-path luauc64/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luauc64-windows-x86_64
          path: luauc64/target/x86_64-pc-windows-msvc/release/luauc64.exe
          if-no-files-found: error

  android-aarch64:
    name: Android aarch64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure linker env
        run: |
          echo "CC_aarch64_linux_android=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --manifest-path luauc64/Cargo.toml --target aarch64-linux-android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luauc64-android-aarch64
          path: luauc64/target/aarch64-linux-android/release/luauc64
          if-no-files-found: error
